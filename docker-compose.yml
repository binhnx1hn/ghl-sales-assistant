services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghl-assistant-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # Defaults — overridden by backend/.env when present
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - WORKERS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ghl-network

networks:
  ghl-network:
    driver: bridge
    name: ghl-network
